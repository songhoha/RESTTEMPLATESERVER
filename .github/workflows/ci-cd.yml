name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  HARBOR_REGISTRY: 210.90.24.172:8080
  HARBOR_PROJECT: restproject
  STUDENT_ID: Hochul
  IMAGE_NAME: resttemplateserver

jobs:
  build-and-push:
    name: Build & Push to Harbor
    runs-on: self-hosted

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven Wrapper
        run: mvnw.cmd clean package -DskipTests

      - name: Set image tag
        id: meta
        run: echo tag=%GITHUB_SHA%>> %GITHUB_OUTPUT%

      - name: Docker login to Harbor
        run: echo %DOCKER_PASSWORD% | docker login %HARBOR_REGISTRY% -u %DOCKER_USERNAME% --password-stdin
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.STUDENT_ID }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.STUDENT_ID }}/${{ env.IMAGE_NAME }}:latest

  update-manifest:
    name: Update K8s Manifest for ArgoCD
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in k8s.yaml
        run: |
          NEW_IMAGE="${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.STUDENT_ID }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s|image: .*${{ env.IMAGE_NAME }}.*|image: ${NEW_IMAGE}|g" k8s.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s.yaml
          git diff --staged --quiet || git commit -m "ci: update image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push